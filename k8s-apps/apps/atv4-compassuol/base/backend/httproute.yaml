apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: backend
  namespace: atv4-compassuol
spec:
  parentRefs:
    - name: public-gateway-ipv4
      group: gateway.networking.k8s.io
      kind: Gateway
      namespace: default
  hostnames:
    - "backend.aesthar.com.br"
  rules:
    - backendRefs:
      - name: backend-service
        group: ''
        kind: Service
        port: 80
        weight: 1	
      matches:	
        - path:	
            type: PathPrefix	
            value: /
