apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: frontend
  namespace: atv4-compassuol
spec:
  parentRefs:
    - name: public-gateway-ipv4
      group: gateway.networking.k8s.io
      kind: Gateway
      namespace: default
  hostnames:
    - "frontend.aesthar.com.br"
  rules:
    - backendRefs:
      - name: frontend-service
        group: ''
        kind: Service
        port: 80
