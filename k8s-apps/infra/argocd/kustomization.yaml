apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: argo-cd
    repo: oci://ghcr.io/argoproj/argo-helm
    version: 9.5.15
    releaseName: argocd
    namespace: argocd
    valuesFile: values.yaml
    includeCRDs: true

resources:
  - httproute-argocd.yaml

namespace: argocd