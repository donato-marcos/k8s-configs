apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

helmCharts:
  - name: kube-prometheus-stack
    repo: oci://ghcr.io/prometheus-community/charts/
    version: 85.3.3
    releaseName: monitoring
    namespace: monitoring
    valuesFile: values.yaml
    includeCRDs: true

resources:
  - httproute-grafana.yaml

namespace: monitoring